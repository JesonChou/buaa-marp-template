<h2 id="%E9%A1%B9%E7%9B%AE%E5%AE%9A%E4%BD%8D%E4%BB%80%E4%B9%88%E6%98%AF-buaa-marp-%E6%A8%A1%E6%9D%BF%E9%A1%B9%E7%9B%AE">项目定位——什么是 BUAA Marp 模板项目</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p>BUAA Marp 模板项目是一套基于 Marp 的北航主题演示文稿生成系统。用户只需提供文字、图片和表格数据，AI 即可自动完成排版，生成专业美观的 PPT。</p>
<p><strong>项目特色：</strong></p>
<ol>
  <li>纯 Markdown 编写，专注内容创作，告别拖拽排版</li>
  <li>5 种页面类型：封面、目录、正文、过渡、结尾</li>
  <li>11 种正文布局，自动匹配内容形态</li>
  <li>集成 Awesome-Marp 增强组件库</li>
  <li>内置 AI Skill，一句话生成完整 PPT</li>
</ol>
<p><strong>核心原则：</strong></p>
<p>用户提供完整素材，AI 负责辅助排版；大纲中没有的内容，AI 一律不自行添加。</p>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">1</div>
</section>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="9" data-marpit-scope-x2yOoGsT="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>2.2.1</span></div>
<h2 id="markdown-%E6%A0%87%E9%A2%98%E5%B1%82%E7%BA%A7%E8%A7%84%E8%8C%83%E4%B8%80%E7%BA%A7%E4%B8%8E%E4%BA%8C%E7%BA%A7%E6%A0%87%E9%A2%98">Markdown 标题层级规范——一级与二级标题</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>1. 一级标题（<code>#</code>）</strong></p>
<p><code>#</code> 仅用于标识整体题目，即文件最顶部的演示文稿总标题。一份大纲中最多出现一个 <code>#</code>。</p>
<p><strong>2. 二级标题（<code>##</code>）</strong></p>
<p><code>##</code> 统一格式为 <code>## Slide N: {可选短标签}</code>，用于区分不同页码的幻灯片内容，<code>N</code> 为从 1 开始递增的序号。标签仅在过渡页使用，正文页可省略标签。</p>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">5</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="10" data-marpit-scope-WwUP8oQv="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>2.2.2</span></div>
<h2 id="markdown-%E6%A0%87%E9%A2%98%E5%B1%82%E7%BA%A7%E8%A7%84%E8%8C%83%E4%B8%89%E7%BA%A7%E6%A0%87%E9%A2%98%E4%B8%8E%E6%B7%B1%E5%BA%A6%E9%99%90%E5%88%B6">Markdown 标题层级规范——三级标题与深度限制</h2>
<div class="buaa-chapter__body buaa-layout--center">
<div class="buaa-text-block">
<strong>3. 三级标题（<code>###</code>）及四级标题（<code>####</code>）</strong>
</div>
<p><code>###</code> 为正文主标题，格式 <code>### {编号} 主标题——副标题</code>，用中文破折号连接。</p>
<table>
<thead>
<tr>
<th style="text-align:center">规则</th>
<th style="text-align:center">说明</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">有编号</td>
<td style="text-align:center">标题中标注了序号 → badge 中填入该序号</td>
</tr>
<tr>
<td style="text-align:center">无编号</td>
<td style="text-align:center">未标注序号 → AI 根据原则自动分配</td>
</tr>
<tr>
<td style="text-align:center">标题栏</td>
<td style="text-align:center">标题栏中<strong>不得出现序号</strong>，序号统一在 badge 内</td>
</tr>
</tbody>
</table>
<br />
<div class="buaa-text-block">
<strong>4. 标题深度限制</strong>
</div>
<p>一级：<code>1</code>、<code>2</code>、<code>3</code> …… 二级：<code>1.1</code>、<code>1.2</code> 三级：<code>1.1.1</code>、<code>1.4.2</code></p>
<p>不得使用四级及以上标题。<code>####</code> 仅用于同编号拆分多页时的子页标识。</p>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">6</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="11" data-marpit-scope-0vT99zJZ="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>2.3</span></div>

<h1 id="%E7%B4%A0%E6%9D%90%E8%BE%93%E5%85%A5%E4%B8%8E%E6%8E%92%E7%89%88%E8%BE%93%E5%87%BA">素材输入与排版输出</h1>
<h2 id="input-specifications--output-standards">Input Specifications &amp; Output Standards</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="31" data-marpit-scope-2qPXACXr="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>5.1</span></div>
<h2 id="%E6%96%87%E5%AD%97%E5%86%85%E5%AE%B9%E8%A7%84%E8%8C%83%E8%BE%93%E5%85%A5%E8%A6%81%E6%B1%82">文字内容规范——输入要求</h2>
<div class="buaa-chapter__body buaa-layout--center">
<div class="buaa-split--2 buaa-split--top">
<div>
<p><strong>散文段落：</strong></p>
<ul>
<li>用自然语言书写，直接跟在标题后，段间空一行</li>
<li>建议 50~300 字/组，超过 500 字的连续段落考虑拆页</li>
</ul>
<p><strong>列表内容：</strong></p>
<ul>
<li>用 <code>1.</code>（有序）或 <code>-</code>（无序）Markdown 语法</li>
<li>每条 ≤60 字为宜，超过 80 字考虑拆项或拆页</li>
<li>嵌套最多 2 层（ol &gt; ul 或 ul &gt; ul）</li>
<li>单页总条目建议 ≤10 条</li>
</ul>
</div>
<div>
<p><strong>加粗强调：</strong></p>
<ul>
<li>用 <code><strong>文字</strong></code> 语法，AI 自动转为 <code>&lt;strong&gt;</code> 标签</li>
<li>每页加粗词条建议 ≤5 个</li>
</ul>
</div>
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">24</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="32" data-marpit-scope-jdUfB1HP="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>5.2</span></div>
<h2 id="%E5%9B%BE%E7%89%87%E7%B4%A0%E6%9D%90%E8%A7%84%E8%8C%83%E8%BE%93%E5%85%A5%E8%A6%81%E6%B1%82">图片素材规范——输入要求</h2>
<div class="buaa-chapter__body buaa-layout--center">
<div class="buaa-split--2 buaa-split--center">
<div>
<table>
<thead>
<tr>
<th style="text-align:center">项目</th>
<th style="text-align:center">规范</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">存放路径</td>
<td style="text-align:center">figures/ 或 {大纲名}.assets/</td>
</tr>
<tr>
<td style="text-align:center">引用方式</td>
<td style="text-align:center"><code>![描述]({相对路径})</code></td>
</tr>
<tr>
<td style="text-align:center">图片格式</td>
<td style="text-align:center">PNG（推荐）、JPG、SVG</td>
</tr>
<tr>
<td style="text-align:center">分辨率</td>
<td style="text-align:center">技术图 1200~1920px / 照片 800~1200px</td>
</tr>
<tr>
<td style="text-align:center">长宽比</td>
<td style="text-align:center">4:3 或 16:9</td>
</tr>
<tr>
<td style="text-align:center">图注</td>
<td style="text-align:center">需要时在图下方加 <code>图注：{说明}</code></td>
</tr>
</tbody>
</table>
</div>
<div>
<div class="buaa-text-block">
<strong>图片数量规则：</strong>
</div>
<ul>
<li>每页正文建议 0~2 张图</li>
<li>双图并排时两张图宽高比应一致</li>
<li>图片前后各留空行（防止被 <code>&lt;p&gt;</code> 包裹）</li>
<li>封面背景图已内置（cover-bg.png），无需额外提供</li>
</ul>
</div>
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">25</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="33" data-marpit-scope-Qx6oObmh="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>5.3</span></div>
<h2 id="%E6%8E%92%E7%89%88%E8%BE%93%E5%87%BA%E6%A0%87%E5%87%86%E7%94%9F%E6%88%90%E7%BB%93%E6%9E%9C%E6%A3%80%E6%9F%A5">排版输出标准——生成结果检查</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p>AI 生成 PPT 后，用户应检查：</p>
<ol>
  <li><strong>编号正确：</strong>正文页码从 1 开始连续递增，封面/目录/过渡无页码</li>
  <li><strong>badge 编号：</strong>单页用单数字，多页用 X.Y，拆页用 X.Y.Z</li>
  <li><strong>标题一致：</strong>大纲中的标题与生成 PPT 中一字不差</li>
  <li><strong>图片可见：</strong>路径正确、图片未压扁拉伸</li>
  <li><strong>图注节制：</strong>图注仅在大纲明确标注时出现</li>
  <li><strong>表格居中：</strong>不在 layout-flow 中放置表格</li>
  <li><strong>公式位置：</strong>公式不在 <code>&lt;li&gt;</code> / <code>&lt;td&gt;</code> / 图注中</li>
</ol>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">26</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="34" data-marpit-scope-zYti4yba="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>5.4</span></div>
<h2 id="%E5%B8%B8%E7%94%A8%E5%BE%AE%E8%B0%83adj--%E5%8D%A0%E4%BD%8D%E7%AC%A6">常用微调——adj-* 占位符</h2>
<div class="buaa-chapter__body buaa-layout--center">
<p>AI 生成的 <code>.md</code> 文件中，<code>&lt;style scoped&gt;</code> 包含注释占位符。取消注释即可微调：</p>
<table>
<thead>
<tr>
<th style="text-align:center">占位符</th>
<th style="text-align:center">作用</th>
<th style="text-align:center">默认值示例</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><code>.adj-img</code></td>
<td style="text-align:center">图片最大高度</td>
<td style="text-align:center">max-height: 480px</td>
</tr>
<tr>
<td style="text-align:center"><code>.adj-txt</code></td>
<td style="text-align:center">文本块字号行距</td>
<td style="text-align:center">font-size: 24px; line-height: 1.8</td>
</tr>
<tr>
<td style="text-align:center"><code>.adj-tbl</code></td>
<td style="text-align:center">表格字号</td>
<td style="text-align:center">font-size: 22px</td>
</tr>
<tr>
<td style="text-align:center"><code>.adj-list</code></td>
<td style="text-align:center">列表字号行距</td>
<td style="text-align:center">font-size: 22px; line-height: 2</td>
</tr>
<tr>
<td style="text-align:center"><code>.adj-buaa-callout</code></td>
<td style="text-align:center">callout 字号行距</td>
<td style="text-align:center">font-size: 22px; line-height: 1.8</td>
</tr>
</tbody>
</table>
<br />
<div class="buaa-callout">
<strong>⚠️ 注意：</strong><code>adj-*</code> 为 class 选择器在 scoped 中大概率不生效，应改用 <code>section { --var }</code> 注入 CSS 变量。
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">27</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="35" data-class="buaa-transition" data-theme="buaa-red" lang="zh-CN" class="buaa-transition" style="--class:buaa-transition;--theme:buaa-red;"><div class="buaa-transition__num">06</div>
<h1 id="%E5%BF%AB%E9%80%9F%E4%B8%8A%E6%89%8B%E6%B5%81%E7%A8%8B">快速上手流程</h1>
<h2 id="quick-start-guide">Quick Start Guide</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="36" data-marpit-scope-AR58AW5p="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>6.1</span></div>
<h2 id="%E5%9B%9B%E6%AD%A5%E7%94%9F%E6%88%90%E4%BB%8E%E5%A4%A7%E7%BA%B2%E5%88%B0%E5%AF%BC%E5%87%BA">四步生成——从大纲到导出</h2>
<div class="buaa-chapter__body buaa-layout--center">
<div class="buaa-flow-chart">
<div class="buaa-flow-chart__node">步骤一：准备素材（整理文字 &rarr; 图片放入 figures/ &rarr; 准备表格）</div>
<div class="buaa-flow-chart__arrow buaa-arrow--line-long buaa-arrow--line-long-down"></div>
<div class="buaa-flow-chart__node">步骤二：编写大纲（复制模板 &rarr; 填入封面/目录/各章内容 &rarr; 标记规范）</div>
<div class="buaa-flow-chart__arrow buaa-arrow--line-long buaa-arrow--line-long-down"></div>
<div class="buaa-flow-chart__node">步骤三：交给 AI Agent（提供大纲.md &rarr; AI 逐页分析 &rarr; 生成 presentation.md）</div>
<div class="buaa-flow-chart__arrow buaa-arrow--line-long buaa-arrow--line-long-down"></div>
<div class="buaa-flow-chart__node">步骤四：预览微调（Ctrl+K V 预览 &rarr; 取消 adj-* 注释 &rarr; 导出），或交由AI Agent微调</div>
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">28</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="37" data-marpit-scope-0LKZncF0="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>6.2</span></div>
<h2 id="%E5%A4%A7%E7%BA%B2%E7%A9%BA%E7%99%BD%E6%A8%A1%E6%9D%BF%E5%8F%AF%E7%9B%B4%E6%8E%A5%E5%A4%8D%E5%88%B6%E4%BD%BF%E7%94%A8">大纲空白模板——可直接复制使用</h2>
<div class="buaa-chapter__body buaa-layout--center">
<div class="buaa-split--2 buaa-split--center">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># {演示文稿总标题}

---

## Slide 1: 封面

{主标题，≤20字}

{副标题，≤20字；不需要则删除此行}

汇报人：{姓名}

---

## Slide 2: 目录

- 01 {章节1标题}
- 02 {章节2标题}
- 03 {章节3标题}

---

## Slide 3: 01 {章节1标题}

### 第X章：{章节1全称}

---

## Slide 4:

### {编号} {页面标题}

{散文段落 / 列表 / 表格 / 图片，按标记规范书写}

---

## Slide N: 结尾
</code></pre>
</div>
<div>
<div class="buaa-callout">
<strong>提醒：</strong>正文标题（<code>###</code>）中的序号将自动填入 PPT 的章节块（badge），标题栏中不再重复显示序号。标题深度严格限制为三级（1 / 1.1 / 1.1.1），禁止四级及以上。
</div>
</div>
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">29</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="38" data-marpit-scope-rPXf8dDH="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>6.3.1</span></div>
<h2 id="16-%E6%9D%A1%E7%A1%AC%E7%BA%A6%E6%9D%9F%E8%87%B4%E5%91%BD%E7%BA%A7">16 条硬约束——致命级</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>致命级：</strong></p>
<ol>
  <li><code>&lt;style scoped&gt;</code> 放在 badge 之前，绝不可放在 page-num 后面</li>
  <li><code>.text-block</code> 内禁止 <code>&lt;p&gt;</code> 标签，裸写文字</li>
  <li>目录 <code>ul</code> 必须带完整 inline style</li>
  <li>公式只能在裸文本段落中，<code>&lt;li&gt;/&lt;td&gt;/hm-cap</code> 中用 <code>&lt;i&gt;x&lt;/i&gt;&lt;sub&gt;1&lt;/sub&gt;</code></li>
  <li>图注仅在大纲标注"图注："时添加</li>
  <li>block-diagram 中 Hub 只在 center 出现一次</li>
  <li>封面必须有 cover-date</li>
</ol>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">30</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="39" data-marpit-scope-99746AB4="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>6.3.2</span></div>
<h2 id="16-%E6%9D%A1%E7%A1%AC%E7%BA%A6%E6%9D%9F%E4%B8%A5%E9%87%8D%E7%BA%A7%E4%B8%8E%E6%B3%A8%E6%84%8F%E7%BA%A7">16 条硬约束——严重级与注意级</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>严重级：</strong></p>
<ol start="8">
  <li>大纲已有标题 &rarr; 严格沿用，一字不改</li>
  <li>同一编号多页 &rarr; 自动细化 X.Y.Z</li>
  <li><code>.adj-*</code> 仅作为 CSS 注释占位，不在 HTML 元素上激活</li>
  <li>加粗用 <code>&lt;strong&gt;</code>，禁止 <code>**text**</code></li>
</ol>
<hr />
<p><strong>注意级：</strong></p>
<ol start="12">
  <li>图片前后各空行，防 <code>&lt;p&gt;</code> 包裹</li>
  <li>禁止：<code>&lt;footer&gt;</code> 标签、内容中用 <code>---</code>（幻灯片分隔符）、<code>&lt;img class/style&gt;</code></li>
  <li>标题层级：<code>#</code>仅用于文件总标题；<code>##</code>仅用于<code>Slide N:</code>分页标识；<code>###</code>为正文主标题；标题深度严格限三级（X / X.Y / X.Y.Z），禁止四级及以上</li>
  <li>序号与标题分离：大纲<code>###</code>中的编号提取填入 badge；<code>##</code>标题栏不出现序号，序号统一放 badge</li>
  <li><strong>规则 #16：</strong>Scoped 样式必须用 <code>section { }</code> 注入 CSS 变量（禁止直接写选择器覆盖）</li>
</ol>
<div class="buaa-callout">
<strong>常见陷阱：</strong>footer &rarr; 用 <code>div.buaa-chapter__footer</code>；幻灯片内 <code>---</code> &rarr; 用 <code>&lt;hr&gt;</code>；表格在 layout-flow &rarr; 用 layout-center
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">31</div>
</section>

<h2 id="template-style-guide">Template Style Guide</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="41" data-marpit-scope-KFDiTzqc="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>7.1</span></div>
<h2 id="%E5%8D%95%E5%9B%BE%E5%B8%83%E5%B1%80%E6%95%88%E6%9E%9C%E4%B8%89%E7%A7%8D%E5%B1%95%E7%A4%BA%E6%96%B9%E5%BC%8F">单图布局效果——三种展示方式</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>文左图右</strong>（布局 A，split-2）：</p>
<p>散文段落与图片并排展示。文字在左，图片在右，各占约 50% 宽度。</p>
<p><strong>文上图下</strong>（布局 F，split-tb）：</p>
<p>文字在上方（≤180字），技术原理图/曲线图在下方全宽展示。</p>
<p><strong>纯大图</strong>（布局 K，layout-center + hm-fig）：</p>
<p>整页仅展示一张大图，无文字或仅标题，最大化展示空间。</p>
<div class="buaa-callout">
<strong>适用场景：</strong>单图布局涵盖日常 80% 的图文混排需求。照片/渲染图用 A，技术大图用 F，核心图表全页展示用 K。
</div>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">32</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="42" data-marpit-scope-cfhK1uMk="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>7.2</span></div>
<h2 id="%E5%8F%8C%E5%9B%BE%E5%B8%83%E5%B1%80%E6%95%88%E6%9E%9C%E5%B9%B6%E6%8E%92%E4%B8%8E%E5%AF%B9%E6%AF%94">双图布局效果——并排与对比</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>双图并排 + 图注</strong>（布局 I，img-pair）：</p>
<p>两张图片左右并排，各自可带独立图注。适用于两方案对比、前后对照等场景。</p>
<p><strong>前后对比</strong>（before-after + ba-label）：</p>
<p>两张图片并排展示，各自上方有标签（如&quot;优化前&quot;、&quot;优化后&quot;），适用于结果对比、方案改进。</p>
<p><strong>双图画廊</strong>（img-gallery gal-2）：</p>
<p>两张图片均匀分布，自动缩放。适用于产品双视角、两阶段结果等对称展示。</p>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">33</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="43" data-marpit-scope-eSTv1dC8="" data-class="buaa-chapter" data-theme="buaa-red" lang="zh-CN" class="buaa-chapter" style="--class:buaa-chapter;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>7.3</span></div>
<h2 id="%E4%B8%89%E5%9B%BE%E5%8F%8A%E5%A4%9A%E5%9B%BE%E5%B8%83%E5%B1%80%E6%95%88%E6%9E%9C%E7%94%BB%E5%BB%8A%E4%B8%8E%E7%BD%91%E6%A0%BC">三图及多图布局效果——画廊与网格</h2>
<div class="buaa-chapter__body buaa-layout--flow">
<p><strong>三图画廊</strong>（img-gallery gal-3）：</p>
<p>三张图片均匀分布，自动缩放。适用于三方案对比、三阶段展示等。</p>
<p><strong>四图画廊</strong>（img-gallery gal-4）：</p>
<p>四张图片均匀分布，适用于多角度对比或四象限展示。</p>
<p><strong>三栏均分</strong>（split-3）：</p>
<p>三列分栏，可用于三方案并排对照、三维度同时展示。</p>
<p><strong>卡片网格</strong>（card-grid + card）：</p>
<p>多个卡片等大排列，带标题和正文说明，适合特性介绍列表。</p>
</div>
<div class="buaa-chapter__footer"></div>
<div class="buaa-chapter__page-num">34</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1366 768"><foreignObject width="1366" height="768"><section id="44" data-class="buaa-end" data-theme="buaa-red" lang="zh-CN" class="buaa-end" style="--class:buaa-end;--theme:buaa-red;"><div class="buaa-chapter__badge"><span>结语</span></div>
